<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Weather Dashboard</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
<h1>Weather Application</h1>
<p>CSCE 548 - Building Secure Software</p>
</header>

<section class="controls">
<button onclick="loadWeatherUI()">Load Weather (UI)</button>
<button onclick="loadWeatherJSON()">Load Weather (JSON)</button>
</section>

<div id="weatherSection"></div>

<h2>Weather Records Table</h2>

<table id="weatherTable">
<thead>
<tr>
<th>ID</th>
<th>City</th>
<th>State</th>
<th>Condition</th>
<th>Temperature</th>
<th>Humidity</th>
<th>Date</th>
</tr>
</thead>

<tbody id="weatherTableBody"></tbody>
</table>

<section class="weatherRecords">
<h3>Manage Weather Records</h3>

<div class="form-container">

<input type="number" id="recordId" placeholder="Record ID (Edit/Delete)">
<input id="city" placeholder="City">
<input id="state" placeholder="State">
<input id="condition" placeholder="Condition">
<input type="number" id="temperature" placeholder="Temperature">
<input type="number" id="humidity" placeholder="Humidity">
<input type="date" id="date">

</div>

<div class="controls">
<button onclick="addRecord()">Add Record</button>
<button onclick="updateRecord()">Update Record</button>
<button onclick="deleteRecord()">Delete Record</button>
</div>
</section>

<footer>
    &copy; 2026 Hardik Marlapudi. All Rights Reserved.
</footer>

<script src="script.js"></script>

</body>
</html>
